<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alhadath Mobile</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f9f9f9;
            margin: 0;
            padding: 0;
        }
        header {
            background: #222;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 24px;
        }
        section {
            padding: 20px;
        }
        h2 {
            color: #333;
            margin-bottom: 15px;
        }
        .products-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .product {
            background: white;
            border: 1px solid #ddd;
            padding: 10px;
            width: 250px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .product img {
            width: 100%;
            border-radius: 5px;
        }
        .product h3 {
            margin: 10px 0 5px;
            font-size: 18px;
        }
        .product p {
            margin: 0 0 10px;
            color: #555;
        }
        .product a {
            display: inline-block;
            padding: 8px 12px;
            background: #25D366;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
        .product a:hover {
            background: #1da851;
        }
    </style>
</head>
<body>

<header>
    Alhadath Mobile
</header>

<!-- قسم العروض -->
<section id="offers">
    <h2>العروض</h2>
    <div class="products-container">
        <div class="product">
            <img src="images/offer1.jpg" alt="Samsung S23">
            <h3>Samsung S23</h3>
            <p>السعر: 700 دينار</p>
            <a href="https://wa.me/962796313243">اطلب عبر واتساب</a>
        </div>

        <div class="product">
            <img src="images/offer2.jpg" alt="iPhone 14">
            <h3>iPhone 14</h3>
            <p>السعر: 650 دينار</p>
            <a href="https://wa.me/962796313243">اطلب عبر واتساب</a>
        </div>
    </div>
</section>

<!-- قسم الأجهزة المستعملة -->
<section id="used-devices">
    <h2>الأجهزة المستعملة</h2>
    <div class="products-container">
        <div class="product">
            <img src="images/used1.jpg" alt="iPhone 12 مستعمل">
            <h3>iPhone 12 مستعمل</h3>
            <p>السعر: 400 دينار</p>
            <a href="https://wa.me/962796313243">اطلب عبر واتساب</a>
        </div>

        <div class="product">
            <img src="images/used2.jpg" alt="Samsung Note 20 مستعمل">
            <h3>Samsung Note 20 مستعمل</h3>
            <p>السعر: 350 دينار</p>
            <a href="https://wa.me/962796313243">اطلب عبر واتساب</a>
        </div>
    </div>
</section>

</body>
</html>
